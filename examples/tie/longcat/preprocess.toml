num_loader_workers = 1
processor_devices = [0]
num_threads_per_worker = 8
queue_size = 16
num_sink_workers = 1
processing_mode = "inference"

[dataset]
type = "csv"
path = "./examples/tie.csv"
attachment_dir = "./examples/assets"

[dataset.column_types]
prompt = "str"
reference_images = "attachment_list"

[processor]
task = "tie"
preset = "longcat_image_edit"

[output]
type = "pickle_directory"
path = "./demo/preprocess_longcat_tie"