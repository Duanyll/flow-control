#:schema ../../../schema/preprocess.schema.json

num_loader_workers = 1
processor_devices = [0]
num_threads_per_worker = 8
queue_size = 16
num_sink_workers = 1
processing_mode = "inference"

[dataset]
type = "csv"
path = "examples/sft/flux_t2i/validation.csv"

[dataset.column_types]
prompt = "str"

[processor]
task = "t2i"
preset = "flux1"

[output]
type = "pickle_directory"
path = "./data/christian_boragine/flux1_validation"