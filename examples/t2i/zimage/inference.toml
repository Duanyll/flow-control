save_preview_dir = "./demo/inference_zimage_t2i_preview"
seed = 1024
hsdp_shard_dim = 1

[model]
arch = "zimage"
type = "base"

[dataset]
type = "pickle_directory"
path = "./demo/preprocess_zimage_t2i"

[sampler]
type = "linear_shift"
steps = 30
cfg_scale = 4.0
enable_cfg_renorm = true

[processor]
task = "t2i"
preset = "zimage"

[launch]
type = "inference"
devices = 4
preprocess_config = "./examples/t2i/zimage/preprocess.toml"