#:schema ../../../schema/inference.schema.json

save_preview_dir = "./demo/inference_zimage_turbo_t2i_preview"
seed = 1024
hsdp_shard_dim = 1

[model]
arch = "zimage"
type = "base"

[model.hf_model]
library = "diffusers"
class_name = "ZImageTransformer2DModel"
pretrained_model_id = "Tongyi-MAI/Z-Image-Turbo"
subfolder = "transformer"
dtype = "bfloat16"

[dataset]
type = "pickle_directory"
path = "./demo/preprocess_zimage_t2i"

[sampler]
steps = 8
cfg_scale = 1.0

[sampler.shift]
type = "linear"

[processor]
task = "t2i"
preset = "zimage"

[launch]
type = "inference"
devices = 4
preprocess_config = "./examples/t2i/zimage/preprocess.toml"
