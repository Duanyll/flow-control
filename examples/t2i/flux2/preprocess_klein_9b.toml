num_loader_workers = 1
processor_devices = [0]
num_threads_per_worker = 8
queue_size = 16
num_sink_workers = 1
processing_mode = "inference"

[dataset]
type = "csv"
path = "./examples/t2i_en.csv"

[dataset.column_types]
prompt = "str"

[processor]
task = "t2i"
preset = "flux2_klein_9b"
save_negative = true # Flux.2 Klein base models support true CFG

[output]
type = "pickle_directory"
path = "./demo/preprocess_flux2_klein_9b_t2i"