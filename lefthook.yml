pre-commit:
  parallel: false
  commands:
    ruff-format:
      glob: "*.py"
      exclude:
        - "flow_control/third_party/**"
        - "notebooks/**"
        - "docs/**"
      run: uv run ruff format {staged_files}
      stage_fixed: true

    ruff-check:
      glob: "*.py"
      exclude:
        - "flow_control/third_party/**"
        - "notebooks/**"
        - "docs/**"
      run: uv run ruff check --fix {staged_files}
      stage_fixed: true

    # pyright:
    #   run: uvx pyright